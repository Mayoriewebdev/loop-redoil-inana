<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>



    <section class="loop-red-oil-section">

    <div class="loop-red-oil-container">

        <!-- Hot Seller -->
        <div class="loop-red-oil-badge" data-aos="zoom-in" data-aos-delay="100">
            <img src="images/Hot seller icon.png" alt="Hot Seller">
        </div>

        <!-- Title -->
        <div class="loop-red-oil-title" data-aos="fade-up" data-aos-delay="200">
            <img src="images/Inana Red oil loop.png" alt="Loop Red Oil Title">
        </div>

        <!-- Description -->
        <div class="loop-red-oil-desc" data-aos="fade-up" data-aos-delay="300">
            <img src="images/Rich text3.png" alt="Description">
        </div>

        <!-- Product Image -->
        <div class="loop-red-oil-image" data-aos="zoom-in-up" data-aos-delay="400">
            <img src="images/Red oil image.png" alt="Loop Red Oil Product">
        </div>

        <!-- Bottom -->
        <div class="loop-red-oil-bottom" data-aos="fade-up" data-aos-delay="500">

            <div class="loop-red-oil-price">
                <img src="images/Starting text200.png" alt="Starting price">
            </div>

            <a href="#" class="loop-red-oil-btn" data-aos="pulse" data-aos-delay="600">
                <img src="images/Buy now icon.png" alt="Buy Now">
            </a>

        </div>

    </div>

</section>





    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 900,
            once: true,
            offset: 120,
            easing: "ease-out-cubic"
        });
    </script>

</body>

</html>
